name: Generate Trading Signals

on:
  schedule:
    # 1H: Every hour at minute 2
    - cron: '2 * * * *'
    # 4H: Every 4 hours at minute 6 (00:06, 04:06, 08:06, 12:06, 16:06, 20:06 UTC)
    - cron: '6 0,4,8,12,16,20 * * *'
  workflow_dispatch:
    inputs:
      timeframe:
        description: 'Timeframe to generate (1H or 4H)'
        required: true
        default: '1H'
        type: choice
        options:
          - '1H'
          - '4H'

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3, 4, 5]
    
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Determine Timeframe
        id: timeframe
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.timeframe }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" == "2 * * * *" ]; then
            echo "value=1H" >> $GITHUB_OUTPUT
          else
            echo "value=4H" >> $GITHUB_OUTPUT
          fi

      - name: Generate Signals (Chunk ${{ matrix.chunk }}/6)
        shell: bash
        run: |
          set -euo pipefail
          echo "Generating signals for timeframe: ${{ steps.timeframe.outputs.value }} chunk: ${{ matrix.chunk }}/6"
          URL="${{ secrets.SUPABASE_URL }}/functions/v1/generate-signals"
          PAYLOAD=$(jq -n \
            --arg tf "${{ steps.timeframe.outputs.value }}" \
            --argjson chunk "${{ matrix.chunk }}" \
            --argjson chunks 6 \
            '{timeframe:$tf, chunk:$chunk, chunks:$chunks}')
          echo "POST $URL"
          echo "Payload: $PAYLOAD"
          for attempt in 1 2 3 4 5; do
            echo "Attempt: $attempt"
            http_code=$(curl -sS \
              --connect-timeout 20 \
              --max-time 180 \
              -D /tmp/headers.txt \
              -o /tmp/body.txt \
              -X POST "$URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              --data "$PAYLOAD" \
              -w "%{http_code}" || true)
            echo "HTTP Status: $http_code"
            echo "---- Response body (first 1200 chars) ----"
            head -c 1200 /tmp/body.txt || true
            echo ""
            echo "-----------------------------------------"
            if [[ "$http_code" == "200" ]]; then
              body="$(cat /tmp/body.txt)"
              if ! echo "$body" | jq -e . >/dev/null 2>&1; then
                echo "::error::Response is not valid JSON"
                echo "Headers:"
                cat /tmp/headers.txt || true
                echo "Body:"
                cat /tmp/body.txt || true
                exit 1
              fi
              success=$(echo "$body" | jq -r '.success // false')
              signalsCreated=$(echo "$body" | jq -r '.signalsCreated // 0')
              processed=$(echo "$body" | jq -r '.processed // 0')
              durationMs=$(echo "$body" | jq -r '.durationMs // 0')
              error_msg=$(echo "$body" | jq -r '.error // "Unknown error"')
              if [[ "$success" != "true" ]]; then
                echo "::error::API returned success=false: $error_msg"
                exit 1
              fi
              if [[ "$signalsCreated" -eq 0 ]]; then
                echo "::notice::Chunk ${{ matrix.chunk }}: No valid setups (OK) - processed $processed pairs in ${durationMs}ms"
              else
                echo "::notice::Chunk ${{ matrix.chunk }}: Successfully created $signalsCreated signals from $processed pairs in ${durationMs}ms"
              fi
              echo "Signal generation completed successfully!"
              exit 0
            fi
            if [[ "$http_code" == "429" || "$http_code" == "502" || "$http_code" == "503" || "$http_code" == "504" ]]; then
              echo "Transient failure ($http_code). Retrying..."
              sleep $((attempt * 10))
              continue
            fi
            echo "::error::Request failed with HTTP status $http_code"
            echo "Headers:"
            cat /tmp/headers.txt || true
            echo "Body:"
            cat /tmp/body.txt || true
            exit 1
          done
          echo "::error::Failed after retries"
          exit 1
